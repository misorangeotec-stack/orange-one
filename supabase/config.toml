# Minimal Supabase CLI config so `supabase functions deploy` can resolve the
# function under supabase/functions/. The remote project is targeted with
# `--project-ref <SUPABASE_PROJECT_REF>` (see supabase/functions/README.md).
project_id = "orange-one"

[functions.admin-users]
verify_jwt = true

# Business-card OCR/extraction (Claude vision). Called by the mobile Leads app
# with the anon apikey; no user login yet, so JWT verification is off.
[functions.extract-card]
verify_jwt = false

# Voice-note transcription (Deepgram nova-3) + Claude translate/analyze.
[functions.transcribe-voice]
verify_jwt = false

# CV/resume extraction (Claude) for the HR Recruitment FMS. Resumes are PII and the
# caller is always a signed-in portal user, so JWT verification stays ON.
[functions.parse-resume]
verify_jwt = true

# Mirror a synced lead into the "Leads DB" Google Sheet + Drive folders. Fired by a
# Postgres trigger on app_leads via pg_net; authed with an x-push-secret header
# (PUSH_GOOGLE_SECRET), so JWT verification is off.
[functions.push-to-google]
verify_jwt = false

# Live foreign-exchange rate (xe.com scrape + FX-API fallback) for the Import
# Purchase FMS. The caller is always a signed-in portal user, so JWT stays ON.
[functions.import-fx-rate]
verify_jwt = true

# Receivables AI analysis (Claude) for the Top-Exposure report's Analysis tab. Receives a
# pre-computed stats summary (no DB reads) and returns a collections narrative. Sensitive
# figures + always a signed-in admin, so JWT verification stays ON.
[functions.analyze-receivables]
verify_jwt = true
